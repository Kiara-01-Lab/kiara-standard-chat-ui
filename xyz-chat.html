<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="XYZ Chat — accessible AI chat interface">
<title>XYZ Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  /* ── Design tokens (light) ── */
  :root {
    --surface-0: #f1efe8;
    --surface-1: #f7f6f1;
    --surface-2: #ffffff;
    --text-primary: #1a1a17;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.16);
    --border-stronger: rgba(0,0,0,0.28);
    --fill-primary: #1a1a17;
    --fill-accent: #378add;
    --bg-accent: #e6f1fb;
    --text-accent: #185fa5;
    --radius: 8px;
    --sidebar-w: 228px;
    --topbar-h: 52px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  /* ── Dark mode ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-0: #1a1a18;
      --surface-1: #222220;
      --surface-2: #2c2c2a;
      --text-primary: #f0ede6;
      --text-secondary: #a8a69e;
      --text-muted: #6e6c66;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.16);
      --border-stronger: rgba(255,255,255,0.28);
      --fill-primary: #f0ede6;
      --fill-accent: #378add;
      --bg-accent: #042c53;
      --text-accent: #85b7eb;
    }
  }

  /* ── Skip link ── */
  .skip-link {
    position: absolute;
    left: -9999px;
    top: 8px;
    padding: 8px 14px;
    background: var(--fill-accent);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius);
    text-decoration: none;
    z-index: 9999;
  }
  .skip-link:focus { left: 8px; }

  /* ── Screen reader only ── */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* ── App shell ── */
  body {
    font-family: var(--font-sans);
    background: var(--surface-0);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface-1);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 12px 8px;
    gap: 2px;
    flex-shrink: 0;
    overflow-y: auto;
    transition: transform 0.22s ease;
    z-index: 20;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px;
    margin-bottom: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    text-decoration: none;
  }

  .logo-mark {
    width: 22px; height: 22px;
    background: var(--fill-primary);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 11px; height: 11px; }

  /* ── Shared button base ── */
  .btn-base {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-sans);
    border-radius: var(--radius);
    transition: background 0.12s, color 0.12s;
  }
  .btn-base:focus-visible {
    outline: 2px solid var(--fill-accent);
    outline-offset: 2px;
  }
  .btn-base:hover { background: var(--surface-2); color: var(--text-primary); }

  .icon-btn {
    min-width: 36px;
    min-height: 36px;
    font-size: 18px;
  }

  /* ── New chat button ── */
  .new-chat-btn {
    width: 100%;
    text-align: left;
    gap: 8px;
    padding: 8px 10px;
    border: 0.5px solid var(--border-strong) !important;
    font-size: 13px;
    min-height: 36px;
    border-radius: var(--radius);
  }
  .new-chat-btn:hover { border-color: var(--border-stronger) !important; }

  /* ── Section label ── */
  .section-label {
    font-size: 11px;
    color: var(--text-muted);
    padding: 14px 10px 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Chat items ── */
  .chat-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chat-item {
    width: 100%;
    text-align: left;
    gap: 8px;
    padding: 7px 10px;
    font-size: 13px;
    min-height: 36px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-radius: var(--radius);
  }
  .chat-item[aria-current="page"] {
    background: var(--surface-2);
    color: var(--text-primary);
    font-weight: 500;
  }

  /* ── Sidebar footer ── */
  .sidebar-footer {
    margin-top: auto;
    border-top: 0.5px solid var(--border);
    padding-top: 10px;
    margin-top: auto;
  }

  .user-row {
    width: 100%;
    text-align: left;
    gap: 8px;
    padding: 7px 8px;
    min-height: 44px;
    border-radius: var(--radius);
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg-accent);
    color: var(--text-accent);
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .user-name { font-size: 13px; color: var(--text-primary); }

  /* ── Overlay ── */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 10;
  }
  .overlay.open { display: block; }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Top bar (mobile) ── */
  .topbar {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    height: var(--topbar-h);
    min-height: var(--topbar-h);
    border-bottom: 0.5px solid var(--border);
    background: var(--surface-1);
    flex-shrink: 0;
  }

  .topbar-logo {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0 auto;
  }

  /* ── Main content ── */
  .main-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 24px;
    gap: 24px;
  }

  .greeting {
    font-size: 26px;
    font-weight: 500;
    color: var(--text-primary);
    text-align: center;
    line-height: 1.3;
  }
  .greeting em {
    font-style: normal;
    color: var(--text-muted);
  }

  /* ── Input area ── */
  .input-area { width: 100%; max-width: 640px; }

  .input-box {
    width: 100%;
    border: 0.5px solid var(--border-strong);
    border-radius: 12px;
    background: var(--surface-2);
    padding: 14px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .input-box:focus-within {
    outline: 2px solid var(--fill-accent);
    outline-offset: 0;
    border-color: transparent;
  }

  .input-box textarea {
    width: 100%;
    border: none;
    background: transparent;
    resize: none;
    font-size: 15px;
    color: var(--text-primary);
    font-family: var(--font-sans);
    outline: none;
    min-height: 52px;
    line-height: 1.6;
  }
  .input-box textarea::placeholder { color: var(--text-muted); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .input-left { display: flex; align-items: center; gap: 4px; }

  .attach-btn {
    min-width: 32px; min-height: 32px;
    border: 0.5px solid var(--border);
    font-size: 16px;
    border-radius: var(--radius);
  }

  .model-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 0.5px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    background: transparent;
    cursor: pointer;
    font-family: var(--font-sans);
    min-height: 30px;
    transition: background 0.12s, color 0.12s;
  }
  .model-pill:hover { background: var(--surface-1); color: var(--text-primary); }
  .model-pill:focus-visible { outline: 2px solid var(--fill-accent); outline-offset: 2px; }

  .send-btn {
    min-width: 36px; min-height: 36px;
    border-radius: 8px;
    border: none;
    background: var(--text-muted);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .send-btn.active { background: var(--fill-primary); }
  .send-btn:focus-visible { outline: 2px solid var(--fill-accent); outline-offset: 2px; }

  /* ── Quick-action chips ── */
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 640px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 0.5px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--surface-2);
    cursor: pointer;
    font-family: var(--font-sans);
    white-space: nowrap;
    min-height: 36px;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .chip:hover {
    border-color: var(--border-stronger);
    color: var(--text-primary);
    background: var(--surface-1);
  }
  .chip:focus-visible { outline: 2px solid var(--fill-accent); outline-offset: 2px; }

  /* ── Mobile breakpoint ── */
  @media (max-width: 560px) {
    .sidebar {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: min(280px, 82vw);
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.18); }
    .topbar { display: flex; }
    .menu-toggle { display: inline-flex !important; }
    .main-scroll { padding: 24px 14px 16px; gap: 18px; }
    .greeting { font-size: 20px; }
    .chip .chip-label { display: none; }
    .chip { padding: 8px 10px; }
  }

  .menu-toggle { display: none; }
</style>
</head>
<body>

<a href="#main-input" class="skip-link">Skip to chat input</a>
<h1 class="sr-only">XYZ Chat</h1>

<div class="layout" id="app">

  <!-- Mobile overlay -->
  <div class="overlay" id="overlay" aria-hidden="true" onclick="closeSidebar()" role="presentation"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar" aria-label="Chat navigation">
    <div class="sidebar-top">
      <a href="#" class="logo" aria-label="XYZ Chat home">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 11 11" fill="none" aria-hidden="true">
            <path d="M5.5 1L10 5.5L5.5 10L1 5.5Z" fill="white"/>
          </svg>
        </div>
        XYZ Chat
      </a>
      <button class="btn-base icon-btn" id="close-nav" onclick="closeSidebar()"
              aria-label="Close navigation menu">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>

    <button class="btn-base new-chat-btn" aria-label="Start a new chat">
      <i class="ti ti-plus" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i>
      New chat
    </button>

    <p class="section-label" id="recents-label">Recent</p>
    <ul class="chat-list" role="list" aria-labelledby="recents-label">
      <li>
        <button class="btn-base chat-item" aria-current="page">
          <i class="ti ti-message" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i>
          Q3 strategy review
        </button>
      </li>
      <li>
        <button class="btn-base chat-item">
          <i class="ti ti-message" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i>
          Debug the API handler
        </button>
      </li>
      <li>
        <button class="btn-base chat-item">
          <i class="ti ti-message" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i>
          Draft onboarding email
        </button>
      </li>
      <li>
        <button class="btn-base chat-item">
          <i class="ti ti-message" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i>
          Summarize this PDF
        </button>
      </li>
      <li>
        <button class="btn-base chat-item">
          <i class="ti ti-message" style="font-size:14px;flex-shrink:0" aria-hidden="true"></i>
          Explain transformers
        </button>
      </li>
    </ul>

    <div class="sidebar-footer">
      <button class="btn-base user-row" aria-label="Account settings for Dave">
        <div class="avatar" aria-hidden="true">DL</div>
        <span class="user-name">Dave</span>
        <i class="ti ti-settings" style="font-size:15px;margin-left:auto;color:var(--text-muted)" aria-hidden="true"></i>
      </button>
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="main-content">

    <!-- Mobile top bar -->
    <div class="topbar" role="banner" aria-label="XYZ Chat header">
      <button class="btn-base icon-btn menu-toggle" id="menu-toggle"
              onclick="openSidebar()"
              aria-label="Open navigation menu"
              aria-expanded="false"
              aria-controls="sidebar">
        <i class="ti ti-menu-2" aria-hidden="true"></i>
      </button>
      <div class="topbar-logo" aria-hidden="true">
        <div class="logo-mark" style="width:20px;height:20px;border-radius:4px">
          <svg viewBox="0 0 11 11" fill="none"><path d="M5.5 1L10 5.5L5.5 10L1 5.5Z" fill="white"/></svg>
        </div>
        XYZ Chat
      </div>
      <button class="btn-base icon-btn" aria-label="Account settings" style="margin-left:auto">
        <i class="ti ti-user" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Content -->
    <div class="main-scroll">
      <p class="greeting" aria-live="polite">Good morning, <em>Dave</em> 👋</p>

      <div class="input-area">
        <div class="input-box" role="region" aria-label="Compose a message">
          <label for="main-input" class="sr-only">Type your message to XYZ Chat</label>
          <textarea
            id="main-input"
            rows="2"
            placeholder="Ask anything…"
            aria-multiline="true"
            aria-describedby="input-hint"
            oninput="handleInput(this)"
          ></textarea>
          <p id="input-hint" class="sr-only">Press Enter to send, Shift+Enter for a new line.</p>
          <div class="input-footer">
            <div class="input-left">
              <button class="btn-base attach-btn" aria-label="Attach a file">
                <i class="ti ti-plus" aria-hidden="true"></i>
              </button>
              <button class="model-pill"
                      aria-label="Switch model. Current: Sonnet 4.6"
                      aria-haspopup="listbox">
                Sonnet 4.6
                <i class="ti ti-chevron-down" style="font-size:12px" aria-hidden="true"></i>
              </button>
            </div>
            <button class="send-btn"
                    id="send-btn"
                    aria-label="Send message"
                    aria-disabled="true"
                    onclick="handleSend()">
              <i class="ti ti-arrow-up" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="chips" role="group" aria-label="Quick-start actions">
        <button class="chip" onclick="setPrompt('Help me write something')">
          <i class="ti ti-pencil" style="font-size:14px" aria-hidden="true"></i>
          <span class="chip-label">Write</span>
        </button>
        <button class="chip" onclick="setPrompt('Help me think through a strategy')">
          <i class="ti ti-chart-line" style="font-size:14px" aria-hidden="true"></i>
          <span class="chip-label">Strategize</span>
        </button>
        <button class="chip" onclick="setPrompt('Help me analyze data')">
          <i class="ti ti-table" style="font-size:14px" aria-hidden="true"></i>
          <span class="chip-label">Analyze</span>
        </button>
        <button class="chip" onclick="setPrompt('Help me write some code')">
          <i class="ti ti-code" style="font-size:14px" aria-hidden="true"></i>
          <span class="chip-label">Code</span>
        </button>
      </div>
    </div>

  </main>
</div>

<script>
  /* ── Sidebar open/close ── */
  function openSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const toggle  = document.getElementById('menu-toggle');
    sidebar.classList.add('open');
    overlay.classList.add('open');
    overlay.removeAttribute('aria-hidden');
    if (toggle) toggle.setAttribute('aria-expanded', 'true');
    document.getElementById('close-nav').focus();
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const toggle  = document.getElementById('menu-toggle');
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    if (toggle) { toggle.setAttribute('aria-expanded', 'false'); toggle.focus(); }
  }

  /* ── Send button state ── */
  function handleInput(el) {
    const btn   = document.getElementById('send-btn');
    const empty = el.value.trim() === '';
    btn.setAttribute('aria-disabled', empty ? 'true' : 'false');
    btn.classList.toggle('active', !empty);
  }

  /* ── Send ── */
  function handleSend() {
    const btn   = document.getElementById('send-btn');
    const input = document.getElementById('main-input');
    if (btn.getAttribute('aria-disabled') === 'true') return;
    input.value = '';
    handleInput(input);
    input.focus();
  }

  /* ── Quick-action chips ── */
  function setPrompt(text) {
    const input = document.getElementById('main-input');
    input.value = text;
    handleInput(input);
    input.focus();
  }

  /* ── Keyboard: Escape closes sidebar ── */
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSidebar();
  });

  /* ── Keyboard: Enter sends (Shift+Enter = newline) ── */
  document.getElementById('main-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  /* ── Chat item active state ── */
  document.querySelectorAll('.chat-item').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.chat-item').forEach(function (b) {
        b.removeAttribute('aria-current');
      });
      btn.setAttribute('aria-current', 'page');
    });
  });
</script>
</body>
</html>
